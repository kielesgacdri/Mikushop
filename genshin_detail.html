<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joki Genshin - Miku Shop</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        .card { background: #252525; border-radius: 15px; padding: 20px; border: 2px solid cyan; }
        .price-list { text-align: left; background: #1e1e1e; padding: 15px; border-radius: 10px; margin: 15px 0; }
        .btn-beli { background: #00e5ff; color: black; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        select { width: 100%; padding: 10px; margin-bottom: 15px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Joki Genshin Impact</h2>
        <img src="primo.png" style="width: 50px;" alt="Primo">
        <div class="price-list">
            <label>Pilih Layanan:</label>
            <select id="layanan">
                <option value="Explore 1 Map - Rp 50.000">Explore 1 Map - Rp 50.000</option>
                <option value="Daily + Resin 1 Minggu - Rp 30.000">Daily + Resin 1 Minggu - Rp 30.000</option>
                <option value="Archon Quest Terbaru - Rp 25.000">Archon Quest Terbaru - Rp 25.000</option>
            </select>
        </div>
        <button class="btn-beli" onclick="gasWA()">BELI SEKARANG</button>
        <p><a href="index.html" style="color: cyan; text-decoration: none;">← Kembali</a></p>
    </div>

    <script>
        function gasWA() {
            const layanan = document.getElementById('layanan').value;
            const teks = "Halo Miku Shop, saya mau order joki: " + layanan;
            // NOMOR SUDAH DIUPDATE KE 083899806945
            window.open("https://wa.me/6283899806945?text=" + encodeURIComponent(teks));
        }
    </script>
</body>
</html>
